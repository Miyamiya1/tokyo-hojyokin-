name: 補助金URL自動チェック
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: URLチェック実行
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python crawler/check_updates.py
      - name: 新規補助金発見
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python crawler/discover_new.py
